context:
  version: "1.0.7"

package:
  name: libgbm
  version: ${{ version }}

source:
  url: https://github.com/glfs-book/libgbm/archive/refs/tags/${{ version }}.tar.gz
  sha256: bfc6c2aa1ceffb739ee9fa850a7c37bbf8a28e4ffb131a3860f34617b99ceedd

build:
  number: 0
  skip:
    - not linux

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - meson
    - pkg-config
  host:
    - libdrm
  run_exports:
    - ${{ pin_subpackage('libgbm', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - gbm.h
      lib:
        - gbm

about:
  homepage: https://github.com/glfs-book/libgbm
  license: MIT
  license_file: LICENSE
  summary: Generic Buffer Management backend loader

extra:
  recipe-maintainers:
    - jschueller
